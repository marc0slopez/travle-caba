<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travle CABA | Juego</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111111;
      --panel: #181818;
      --panel-soft: #222222;
      --line: #343434;
      --text: #f2f2f2;
      --muted: #9f9f9f;
      --accent: #75aadb;
      --start: #f06292;
      --end: #4dd0e1;
      --success: #70c17b;
      --hint: #ffd86b;
      --error: #ef5350;
      --radius: 8px;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .main-split {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      background: var(--bg);
    }

    #map-container {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(117, 170, 219, 0.08), transparent 32%),
        #111111;
      border-right: 1px solid var(--line);
      overflow: hidden;
    }

    #mapa {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: clamp(10px, 2vw, 24px);
    }

    #caba-map {
      width: 100%;
      height: 100%;
      max-height: 100vh;
      display: block;
    }

    .barrio-path {
      fill: #1d1d1d;
      stroke: #3d3d3d;
      stroke-width: 1.35;
      vector-effect: non-scaling-stroke;
      transition: fill 160ms ease, stroke 160ms ease, opacity 160ms ease;
      fill-rule: evenodd;
    }

    .barrio-path:hover,
    .barrio-path:focus-visible {
      outline: none;
      fill: #282828;
      stroke: #686868;
    }

    .barrio-path.is-start {
      fill: var(--start);
      stroke: #f9a3c0;
    }

    .barrio-path.is-end {
      fill: var(--end);
      stroke: #a8f2fb;
    }

    .barrio-path.is-correct {
      fill: #ffe082;
      stroke: #ffc342;
    }

    .barrio-path.is-wrong {
      fill: #5f5f5f;
      stroke: #b4b4b4;
    }

    .barrio-path.is-silhouette {
      stroke: var(--hint);
      stroke-width: 3;
      fill: rgba(255, 216, 107, 0.16);
    }

    .map-label {
      paint-order: stroke;
      stroke: #101010;
      stroke-width: 4;
      fill: #ffffff;
      font-size: 15px;
      font-weight: 800;
      pointer-events: none;
    }

    .sidebar {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
    }

    .sidebar-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: inline-flex;
      gap: 6px;
      color: var(--text);
      text-decoration: none;
      font-size: 19px;
      font-weight: 800;
    }

    .brand span {
      color: var(--muted);
      font-weight: 500;
    }

    .route-info {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      margin-top: 16px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #141414;
    }

    .route-node {
      min-width: 0;
      padding: 7px 8px;
      border-radius: 6px;
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .start-node {
      color: #ffd2e1;
      background: rgba(240, 98, 146, 0.2);
      border: 1px solid rgba(240, 98, 146, 0.45);
    }

    .end-node {
      color: #d7fbff;
      background: rgba(77, 208, 225, 0.18);
      border: 1px solid rgba(77, 208, 225, 0.42);
    }

    #progress-counter {
      margin-top: 10px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    #progress-counter.is-complete {
      color: var(--success);
      font-weight: 800;
    }

    .sidebar-content {
      min-height: 0;
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-group {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    #guess-input {
      min-width: 0;
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid #474747;
      border-right: 0;
      border-radius: var(--radius) 0 0 var(--radius);
      padding: 12px 14px;
      outline: none;
    }

    #guess-input:focus {
      border-color: #707070;
    }

    #guess-btn {
      border: 1px solid #474747;
      background: #2b2b2b;
      color: var(--text);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 800;
    }

    #guess-btn:hover {
      background: #333333;
    }

    #status {
      min-height: 22px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    #status[data-tone="success"] {
      color: var(--success);
    }

    #status[data-tone="error"] {
      color: var(--error);
    }

    #status[data-tone="hint"] {
      color: var(--hint);
    }

    .hint-list {
      margin: 0;
      padding-left: 18px;
      text-align: left;
    }

    .history-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    #guesses-history {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      width: 100%;
      border: 1px solid #2f2f2f;
      background: #151515;
      color: var(--text);
      border-radius: 6px;
      padding: 9px 11px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      text-align: left;
    }

    .history-item:hover {
      border-color: #555555;
    }

    .status-square {
      width: 12px;
      height: 12px;
      flex: 0 0 12px;
      border-radius: 3px;
      margin-top: 3px;
    }

    .status-square.correct {
      background: var(--success);
    }

    .status-square.incorrect {
      background: var(--error);
    }

    .sidebar-footer {
      border-top: 1px solid var(--line);
      padding: 16px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #151515;
    }

    .row-tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tool-btn {
      min-height: 40px;
      border: 1px solid #3d3d3d;
      border-radius: var(--radius);
      background: transparent;
      color: #c8c8c8;
      cursor: pointer;
      font-weight: 700;
    }

    .tool-btn:hover {
      border-color: #626262;
      background: #202020;
    }

    #giveup-btn {
      color: #ff9a9a;
      border-color: rgba(239, 83, 80, 0.45);
    }

    #new-route-btn {
      color: var(--accent);
      border-color: rgba(117, 170, 219, 0.45);
    }

    .autocomplete-items {
      position: fixed;
      z-index: 20;
      max-height: 230px;
      overflow-y: auto;
      border: 1px solid #555555;
      border-radius: 0 0 var(--radius) var(--radius);
      background: #242424;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
    }

    .autocomplete-items button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #333333;
      background: transparent;
      color: var(--text);
      padding: 10px;
      text-align: left;
      cursor: pointer;
    }

    .autocomplete-items button:hover {
      background: #333333;
    }

    @keyframes shake-anim {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @keyframes pulse-anim {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.55); }
      100% { filter: brightness(1); }
    }

    @keyframes win-flash {
      0%, 100% { box-shadow: inset 0 0 0 rgba(112, 193, 123, 0); }
      50% { box-shadow: inset 0 0 80px rgba(112, 193, 123, 0.18); }
    }

    .input-error {
      animation: shake-anim 0.32s ease-in-out;
      border-color: var(--error) !important;
    }

    .input-success {
      border-color: var(--success) !important;
    }

    .anim-shake {
      animation: shake-anim 0.4s ease-in-out;
    }

    .anim-pulse {
      animation: pulse-anim 0.8s ease-in-out;
    }

    .won-game #map-container {
      animation: win-flash 1.4s ease-in-out;
    }

    .gave-up #map-container {
      filter: grayscale(0.35);
    }

    @media (max-width: 820px) {
      html,
      body {
        overflow: auto;
        overflow-x: hidden;
      }

      .main-split {
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        height: auto;
        display: block;
      }

      #map-container {
        width: 100%;
        height: 46vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 2;
      }

      .sidebar {
        width: 100%;
        min-height: 54vh;
      }

      .sidebar-footer {
        position: sticky;
        bottom: 0;
      }
    }
  </style>
</head>

<body>
  <div class="main-split">
    <div id="map-container">
      <div id="mapa"></div>
    </div>

    <aside class="sidebar">
      <header class="sidebar-header">
        <a class="brand" href="index.html">travle <span>| CABA</span></a>
        <div class="route-info" aria-live="polite">
          <span class="route-node start-node" id="info-partida">...</span>
          <span aria-hidden="true">→</span>
          <span class="route-node end-node" id="info-llegada">...</span>
        </div>
        <div id="progress-counter">0 / ? barrios</div>
      </header>

      <section class="sidebar-content">
        <div>
          <form id="guess-form" class="input-group">
            <input id="guess-input" type="text" placeholder="Barrio..." autocomplete="off" />
            <button type="submit" id="guess-btn">Adivinar</button>
          </form>
          <div id="status" aria-live="polite"></div>
        </div>

        <div>
          <div class="history-label">Intentos anteriores</div>
          <div id="guesses-history"></div>
        </div>
      </section>

      <footer class="sidebar-footer">
        <button id="silhouette-btn" class="tool-btn" type="button">Ver Silueta</button>
        <div class="row-tools">
          <button id="hint-btn" class="tool-btn" type="button">Pista</button>
          <button id="reset-btn" class="tool-btn" type="button">Pistas usadas</button>
        </div>
        <div class="row-tools">
          <button id="giveup-btn" class="tool-btn" type="button">Rendirse</button>
          <button id="new-route-btn" class="tool-btn" type="button">Nueva Ruta</button>
        </div>
      </footer>
    </aside>
  </div>

  <script type="module" src="js/main.js"></script>
</body>

</html>
